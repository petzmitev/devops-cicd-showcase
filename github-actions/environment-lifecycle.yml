name: Configure Azure environment

on:
  pull_request:
    types:
      - labeled

permissions:
  contents: read

env:
  IMAGE_REGISTRY_URL: ghcr.io
  AZURE_RESOURCE_GROUP: devops-showcase-rg
  AZURE_APP_PLAN: devops-showcase-plan
  AZURE_LOCATION: eastus
  AZURE_WEBAPP_NAME: your-unique-web-app-name

jobs:
  create-azure-environment:
    name: Create Azure environment
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'spin up environment')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Create App Service plan
        run: |
          az appservice plan create \
            --name "${{ env.AZURE_APP_PLAN }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --is-linux \
            --sku F1 \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Create Azure Web App
        run: |
          az webapp create \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --plan "${{ env.AZURE_APP_PLAN }}" \
            --deployment-container-image-name nginx \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Configure GHCR access
        run: |
          az webapp config container set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --docker-custom-image-name nginx \
            --docker-registry-server-url "https://${{ env.IMAGE_REGISTRY_URL }}" \
            --docker-registry-server-user "${{ github.actor }}" \
            --docker-registry-server-password "${{ secrets.GHCR_PAT }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Log out from Azure
        if: always()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az logout
            az cache purge
            az account clear

  destroy-azure-environment:
    name: Destroy Azure environment
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'destroy environment')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete resource group
        run: |
          az group delete \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --yes \
            --no-wait

      - name: Log out from Azure
        if: always()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az logout
            az cache purge
            az account clear